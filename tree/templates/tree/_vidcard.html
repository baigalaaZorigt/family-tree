<!-- Видео мэдэгдлийн том thumbnail карт — Нүүр feed болон Мэдэгдэл таб хоёулаа
     ашигладаг. Context: `note` (video_url/video_poster/title/body/created_at). -->
<div class="fcard vidcard clickable"
     data-video="{{ note.video_url }}" data-poster="{{ note.video_poster }}" data-caption="{{ note.title }}">
  <div class="vidthumb" {% if note.video_poster %}style="background-image:url('{{ note.video_poster }}')"{% endif %}>
    <span class="vidplay">▶</span>
  </div>
  <div class="vidinfo">
    <div class="ftitle">{{ note.title }}</div>
    {% if note.body %}<div class="fmeta">{{ note.body }}</div>{% endif %}
    <div class="ftime">{{ note.created_at|date:"Y.m.d · H:i" }}</div>
  </div>
</div>
