<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
{% include 'tree/_pwa.html' %}
<title>Нэвтрэх · Халтарынхан</title>
<style>
  :root{ --navy:#122a5e; --navy-2:#1c3c7d; --navy-deep:#0a1c40; --gold:#d9b35c; --gold-2:#f0d28a;
    --gold-deep:#a8842f; --paper:#fbf6ea; --ink:#2c2415; --soft:#8a7c5c; --card:#fffdf6;
    --border:#e0d2ac; --f:#9c3b52; --f-soft:#f6e8ec; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif; color:var(--ink);
    min-height:100vh; background-color:#ede0bf;
    background-image:radial-gradient(1000px 460px at 50% -160px, rgba(18,42,94,.30), transparent 72%),
      radial-gradient(circle at center, rgba(168,132,47,.10) 1px, transparent 1.6px);
    background-size:auto,26px 26px; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card{ width:100%; max-width:420px; background:var(--card); border:1px solid var(--border);
    border-radius:18px; box-shadow:0 18px 50px rgba(10,28,64,.25); padding:30px 26px; }
  .mark{ width:52px; height:52px; border-radius:50%; border:2px solid var(--gold); background:var(--navy);
    color:var(--gold-2); display:grid; place-items:center; font-size:24px; margin:0 auto 14px; }
  h2{ text-align:center; color:var(--navy-deep); font-size:23px; }
  .sub{ text-align:center; color:var(--soft); font-size:13.5px; margin:6px 0 20px;
    font-family:'Trebuchet MS',sans-serif; }
  .fld{ margin-bottom:15px; }
  .fld label{ display:block; font-size:12.5px; color:var(--gold-deep); letter-spacing:.06em;
    text-transform:uppercase; margin-bottom:6px; font-family:'Trebuchet MS',sans-serif; }
  .fld input{ width:100%; font-family:inherit; font-size:16px; color:var(--ink); background:var(--paper);
    border:1px solid var(--border); border-radius:10px; padding:12px; outline:none; }
  .fld input:focus{ border-color:var(--gold); }
  .btn{ width:100%; font-family:inherit; font-size:16px; font-weight:700; cursor:pointer; color:#fff;
    background:linear-gradient(180deg,var(--navy-2),var(--navy)); border:1px solid var(--gold);
    border-radius:11px; padding:13px; margin-top:6px; }
  .btn:hover{ filter:brightness(1.08); }
  .err{ background:var(--f-soft); color:var(--f); border:1px solid #e5c2cb; border-radius:10px;
    padding:10px 12px; font-size:13.5px; margin-bottom:16px; font-family:'Trebuchet MS',sans-serif; }
  .back{ display:block; text-align:center; margin-top:18px; color:var(--navy-2); font-size:14px; text-decoration:none; }
  .hint{ margin-top:16px; font-size:12px; color:var(--soft); text-align:center; font-family:'Trebuchet MS',sans-serif; line-height:1.6; }

  /* ==== Минимал · мэргэжлийн override ==== */
  :root{ --navy:#26324a; --navy-2:#3a4c6e; --navy-deep:#1c2536; --gold:#c0a24f; --gold-2:#d0b56f;
    --gold-deep:#8f7330; --paper:#ffffff; --ink:#1d2432; --soft:#6f7787; --card:#ffffff;
    --border:#e5e8ed; --line:#e4e7ec; --f:#a04d64; --f-soft:#f6ecf0; }
  body{ background-color:#f5f6f8 !important; background-image:none !important;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,Arial,sans-serif !important; }
  h1,h2,h3{ font-family:inherit !important; letter-spacing:-.01em; }
  .card,.authcard{ box-shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.05) !important; }
  .btn,.bigbtn{ background:var(--navy) !important; border-color:var(--navy) !important; }
</style>
</head>
<body>
  <form class="card" method="post" action="{% url 'login' %}" data-loader="Нэвтэрч байна…">
    {% csrf_token %}
    <div class="mark">ᠬ</div>
    <h2>Нэвтрэх</h2>
    <div class="sub">Халтарынхан · Ургийн бичиг</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <div class="fld">
      <label for="u">Утасны дугаар</label>
      <input id="u" name="username" inputmode="tel" autocomplete="username" placeholder="9911xxxx" required autofocus>
    </div>
    <div class="fld">
      <label for="p">Төрсөн он-сар-өдөр (нууц үг)</label>
      <input id="p" name="password" type="password" autocomplete="current-password" placeholder="1965.02.26" required>
    </div>
    <button class="btn" type="submit">Нэвтрэх</button>
    <div class="hint">Нэвтрэх нэр нь <b>утасны дугаар</b>, нууц үг нь <b>төрсөн огноо</b> (жишээ нь 1965.02.26 эсвэл 1965).</div>
    <a class="back" href="{% url 'tree' %}">← Ургийн мод руу буцах</a>
  </form>
{% include 'tree/_loader.html' %}
</body>
</html>
